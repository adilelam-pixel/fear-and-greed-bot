name: Daily Fear and Greed Tracker

on:
  schedule:
    # Runs everyday at 21:00 UTC (4 PM EST / 5 PM EDT - right around market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # This allows you to click a button and run it manually whenever you want

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the script permission to save and push the CSV file back

    steps:
    - name: Checkout repository data
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper Script
      run: python fetch_fear_greed.py

    - name: Commit and Save CSV to Repository
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add fear_and_greed_history.csv
        # Only commit if changes exist, preventing errors if nothing changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily data update" && git push)
