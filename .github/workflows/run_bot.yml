name: Daily Fear and Greed Tracker

on:
  schedule:
    # Runs everyday at 21:00 UTC (4 PM EST / 5 PM EDT - right around market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository data
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib

    - name: Run Scraper Script & Generate Chart
      run: python fetch_fear_greed.py

    - name: Commit and Save CSV to Repository
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add fear_and_greed_history.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily data update" && git push)

    - name: Send Email Report with Attached Chart
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "Daily Market Sentiment Report"
        to: ${{ secrets.TARGET_EMAIL }}
        from: "Fear & Greed Cloud Bot"
        body: "The daily market evaluation scan has completed successfully. Please check the attached trend diagram for the 30-day index trajectory and individual market components."
        attachments: fear_and_greed_chart.png
