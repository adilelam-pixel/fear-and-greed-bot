name: Daily Fear and Greed Tracker

on:
  schedule:
    # Your target time: 21:00 UTC (23:00 French Summer Time)
    - cron: '0 21 * * *'
  workflow_dispatch: 
  push:
    branches:
      - main  # Forces GitHub to evaluate the workflow on every save

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository data
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib

    - name: Run Scraper Script, Generate Chart & Email
      env:
        MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
      run: python fetch_fear_greed.py

    - name: Commit and Save CSV to Repository
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add fear_and_greed_history.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily data update" && git push)
