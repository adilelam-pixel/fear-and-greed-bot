name: Daily Fear and Greed Tracker

on:
  schedule:
    # Runs everyday at 21:00 UTC (4 PM EST / 5 PM EDT - right around market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime

# Future-proofs the runner for the June 16th, 2026 Node 24 upgrade
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for allowing the bot to save your CSV file

    steps:
    - name: Checkout repository data
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper Script
      run: python fetch_fear_greed.py

    - name: Commit and Save CSV to Repository
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add fear_and_greed_history.csv
        # Only commit if data changed, which prevents empty/error runs
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily data update" && git push)
